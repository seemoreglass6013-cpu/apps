<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPM Tracker (Pro Auto-Save Edition)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .info-header { font-size: 14px; color: #7f8c8d; text-align: right; margin-bottom: 5px; }
        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        textarea:focus { border-color: #3498db; outline: none; }
        
        .timer-display {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 10px;
            height: 30px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-start { background-color: #27ae60; color: white; }
        .btn-stop { background-color: #e74c3c; color: white; }
        .btn-reset { background-color: #95a5a6; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .result-panel {
            text-align: center;
            padding: 25px;
            background: #ecf0f1;
            border-radius: 8px;
        }
        .wpm-score {
            font-size: 56px;
            font-weight: bold;
            color: #2980b9;
            margin: 10px 0;
        }
        .level-badge {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            background: #34495e;
            color: white;
            font-size: 18px;
            margin-top: 5px;
        }
        .stats-detail { font-size: 15px; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>WPM Tracker</h1>
    <div class="info-header">※文章は自動保存されています</div>
    
    <textarea id="inputText" placeholder="ここに英文を貼り付けてください..."></textarea>
    
    <div id="timerDisplay" class="timer-display">Ready</div>
    
    <div class="controls">
        <button id="startBtn" class="btn-start">計測開始 (Start)</button>
        <button id="stopBtn" class="btn-stop" disabled>読了 (Stop)</button>
        <button id="resetBtn" class="btn-reset">リセット</button>
    </div>

    <div class="result-panel">
        <div>Reading Speed:</div>
        <div id="wpmDisplay" class="wpm-score">0</div>
        <div id="levelDisplay" class="level-badge">LEVEL: -</div>
        <div id="stats" class="stats-detail">単語数: 0 | タイム: 0.0秒</div>
    </div>
</div>

<script>
    let startTime;
    let timerInterval;
    const inputText = document.getElementById('inputText');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    const wpmDisplay = document.getElementById('wpmDisplay');
    const levelDisplay = document.getElementById('levelDisplay');
    const timerDisplay = document.getElementById('timerDisplay');
    const stats = document.getElementById('stats');

    // 読み込み時に自動復元
    window.onload = () => {
        const savedData = localStorage.getItem('wpm_app_text');
        if (savedData) {
            inputText.value = savedData;
        }
    };

    // 入力時に自動保存
    inputText.addEventListener('input', () => {
        localStorage.setItem('wpm_app_text', inputText.value);
    });

    function getLevel(wpm) {
        if (wpm < 80) return "Beginner (ゆっくり丁寧！)";
        if (wpm < 120) return "Intermediate (平均的ペース！)";
        if (wpm < 180) return "Fluent (スムーズな読解力！)";
        if (wpm < 250) return "Professional (ネイティブ並み！)";
        return "Speed Demon (超人級の速さ！)";
    }

    startBtn.addEventListener('click', () => {
        if (!inputText.value.trim()) {
            alert("文章を入力してください");
            return;
        }
        startTime = Date.now();
        startBtn.disabled = true;
        stopBtn.disabled = false;
        inputText.readOnly = true;
        
        // リアルタイムタイマー
        timerInterval = setInterval(() => {
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            timerDisplay.innerText = `${elapsed} s`;
        }, 100);
    });

    stopBtn.addEventListener('click', () => {
        clearInterval(timerInterval);
        const endTime = Date.now();
        const durationInSeconds = (endTime - startTime) / 1000;
        const durationInMinutes = durationInSeconds / 60;
        
        const words = inputText.value.trim().split(/\s+/).length;
        const wpm = Math.round(words / durationInMinutes);
        
        wpmDisplay.innerText = wpm;
        levelDisplay.innerText = `LEVEL: ${getLevel(wpm)}`;
        stats.innerText = `単語数: ${words} | タイム: ${durationInSeconds.toFixed(1)}秒`;
        timerDisplay.innerText = "Complete!";
        
        startBtn.disabled = false;
        stopBtn.disabled = true;
        inputText.readOnly = false;
    });

    resetBtn.addEventListener('click', () => {
        if (confirm("入力した文章と結果をリセットしますか？")) {
            clearInterval(timerInterval);
            inputText.value = "";
            localStorage.removeItem('wpm_app_text');
            wpmDisplay.innerText = "0";
            levelDisplay.innerText = "LEVEL: -";
            stats.innerText = "単語数: 0 | タイム: 0.0秒";
            timerDisplay.innerText = "Ready";
            startBtn.disabled = false;
            stopBtn.disabled = true;
            inputText.readOnly = false;
        }
    });
</script>

</body>
</html>

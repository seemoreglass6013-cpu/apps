<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPM Reading Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Lucideアイコンの簡易コンポーネント
        const Icon = ({ name, size = 20, ...props }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                const icon = lucide.icons[name];
                if (icon) {
                    setSvg(lucide.createIcons({ icons: { [name]: icon } }));
                }
            }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} {...props}></i>;
        };

        const App = () => {
            const [text, setText] = useState('');
            const [wordCount, setWordCount] = useState(0);
            const [isRunning, setIsRunning] = useState(false);
            const [time, setTime] = useState(0);
            const [wpm, setWpm] = useState(null);
            const timerRef = useRef(null);

            useEffect(() => {
                const words = text.trim() ? text.trim().split(/\s+/).length : 0;
                setWordCount(words);
            }, [text]);

            useEffect(() => {
                if (isRunning) {
                    timerRef.current = setInterval(() => {
                        setTime((prevTime) => prevTime + 1);
                    }, 1000);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [isRunning]);

            useEffect(() => {
                // アイコンの再レンダリング用
                lucide.createIcons();
            });

            const handleStart = () => {
                if (wordCount === 0) return;
                setIsRunning(true);
                setTime(0);
                setWpm(null);
            };

            const handleStop = () => {
                setIsRunning(false);
                if (time > 0 && wordCount > 0) {
                    const minutes = time / 60;
                    const calculatedWpm = Math.round(wordCount / minutes);
                    setWpm(calculatedWpm);
                }
            };

            const handleReset = () => {
                setIsRunning(false);
                setTime(0);
                setWpm(null);
                setText('');
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const getWpmFeedback = (wpmValue) => {
                if (wpmValue < 100) return { label: 'じっくり読解中', color: 'text-blue-500' };
                if (wpmValue < 150) return { label: '標準的なペース', color: 'text-green-500' };
                if (wpmValue < 200) return { label: '流暢な読解', color: 'text-purple-500' };
                return { label: 'ネイティブレベルの速さ', color: 'text-orange-500' };
            };

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans text-slate-800">
                    <div className="max-w-2xl mx-auto space-y-6">
                        <div className="text-center space-y-2">
                            <h1 className="text-3xl font-bold text-slate-900 flex items-center justify-center gap-2">
                                <i data-lucide="book-open" className="text-indigo-600"></i>
                                WPM タイマー
                            </h1>
                            <p className="text-slate-500">B1レベル目標: 120-150 WPM</p>
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <textarea
                                className="w-full h-64 p-4 text-lg border-none focus:ring-2 focus:ring-indigo-500 resize-none outline-none"
                                placeholder="英文を貼り付けてください..."
                                value={text}
                                onChange={(e) => setText(e.target.value)}
                                disabled={isRunning}
                            />
                            <div className="bg-slate-50 px-4 py-2 border-t border-slate-200 flex justify-between text-sm text-slate-500">
                                <span>単語数: <strong>{wordCount}</strong> words</span>
                                <span>目標: 2026/10まで</span>
                            </div>
                        </div>

                        <div className="flex flex-wrap gap-4 justify-center items-center bg-white p-6 rounded-2xl shadow-md border border-slate-100">
                            <div className="flex flex-col items-center px-6 border-r border-slate-100">
                                <span className="text-xs uppercase tracking-widest text-slate-400 font-bold">Time</span>
                                <span className="text-4xl font-mono font-bold text-slate-700">{formatTime(time)}</span>
                            </div>

                            <div className="flex gap-3">
                                {!isRunning ? (
                                    <button onClick={handleStart} disabled={wordCount === 0}
                                        className={`flex items-center gap-2 px-8 py-3 rounded-full font-bold transition-all ${wordCount > 0 ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-200 text-slate-400'}`}>
                                        開始
                                    </button>
                                ) : (
                                    <button onClick={handleStop}
                                        className="flex items-center gap-2 px-8 py-3 bg-rose-500 text-white rounded-full font-bold shadow-lg">
                                        停止
                                    </button>
                                )}
                                <button onClick={handleReset} className="p-3 text-slate-400 hover:bg-slate-100 rounded-full">
                                    <i data-lucide="refresh-ccw"></i>
                                </button>
                            </div>
                        </div>

                        {wpm !== null && (
                            <div className="bg-indigo-900 text-white p-8 rounded-2xl shadow-xl">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-indigo-800/50 p-4 rounded-xl text-center">
                                        <p className="text-indigo-200 text-sm">Your WPM</p>
                                        <p className="text-5xl font-black">{wpm}</p>
                                    </div>
                                    <div className="bg-indigo-800/50 p-4 rounded-xl text-center">
                                        <p className="text-indigo-200 text-sm">Rating</p>
                                        <p className={`text-lg font-bold ${getWpmFeedback(wpm).color}`}>
                                            {getWpmFeedback(wpm).label}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

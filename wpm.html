<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPM Tracker (Auto-Save Edition)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        h1 { text-align: center; color: #2c3e50; }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        textarea:focus {
            border-color: #3498db;
            outline: none;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-start { background-color: #27ae60; color: white; }
        .btn-stop { background-color: #e74c3c; color: white; }
        .btn-reset { background-color: #95a5a6; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .result-panel {
            text-align: center;
            padding: 20px;
            background: #ecf0f1;
            border-radius: 8px;
        }
        .wpm-score {
            font-size: 48px;
            font-weight: bold;
            color: #2980b9;
        }
        .info { font-size: 14px; color: #7f8c8d; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>WPM Tracker</h1>
    
    <p class="info">※入力した文章はブラウザに自動保存されます。</p>
    <textarea id="inputText" placeholder="ここに英文を貼り付けてください..."></textarea>
    
    <div class="controls">
        <button id="startBtn" class="btn-start">開始 (Start)</button>
        <button id="stopBtn" class="btn-stop" disabled>終了 (Stop)</button>
        <button id="resetBtn" class="btn-reset">リセット</button>
    </div>

    <div class="result-panel">
        <div>あなたのWPM:</div>
        <div id="wpmDisplay" class="wpm-score">0</div>
        <div id="stats" class="info">経過時間: 0秒 | 単語数: 0</div>
    </div>
</div>

<script>
    let startTime;
    let timerInterval;
    const inputText = document.getElementById('inputText');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    const wpmDisplay = document.getElementById('wpmDisplay');
    const stats = document.getElementById('stats');

    // --- 【新機能】保存されたテキストの読み込み ---
    window.onload = () => {
        const savedData = localStorage.getItem('wpm_app_text');
        if (savedData) {
            inputText.value = savedData;
        }
    };

    // --- 【新機能】入力されるたびに自動保存 ---
    inputText.addEventListener('input', () => {
        localStorage.setItem('wpm_app_text', inputText.value);
    });

    startBtn.addEventListener('click', () => {
        if (!inputText.value.trim()) {
            alert("文章を入力してください");
            return;
        }
        startTime = Date.now();
        startBtn.disabled = true;
        stopBtn.disabled = false;
        inputText.readOnly = true;
        
        // 簡易タイマー表示（秒のみ）
        timerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            stats.innerText = `計測中... (${elapsed}秒経過)`;
        }, 1000);
    });

    stopBtn.addEventListener('click', () => {
        clearInterval(timerInterval);
        const endTime = Date.now();
        const durationInMinutes = (endTime - startTime) / 1000 / 60;
        
        const words = inputText.value.trim().split(/\s+/).length;
        const wpm = Math.round(words / durationInMinutes);
        
        wpmDisplay.innerText = wpm;
        stats.innerText = `経過時間: ${Math.round(durationInMinutes * 60)}秒 | 単語数: ${words}`;
        
        startBtn.disabled = false;
        stopBtn.disabled = true;
        inputText.readOnly = false;
    });

    resetBtn.addEventListener('click', () => {
        if (confirm("入力した文章と結果をリセットしますか？")) {
            clearInterval(timerInterval);
            inputText.value = "";
            localStorage.removeItem('wpm_app_text'); // 保存データも消去
            wpmDisplay.innerText = "0";
            stats.innerText = "経過時間: 0秒 | 単語数: 0";
            startBtn.disabled = false;
            stopBtn.disabled = true;
            inputText.readOnly = false;
        }
    });
</script>

</body>
</html>

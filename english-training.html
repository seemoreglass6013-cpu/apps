<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English 5-Accent Trainer</title>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text-main);
        }
        .app-card {
            background: var(--card);
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        h1 { font-size: 1.25rem; text-align: center; margin-bottom: 1.5rem; }
        
        .textarea-container { position: relative; }
        textarea {
            width: 100%;
            height: 180px;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
            line-height: 1.5;
            font-family: inherit;
        }
        textarea:focus { border-color: var(--primary); outline: none; }

        .clear-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #f1f5f9;
            color: var(--text-sub);
            border: none;
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .clear-btn:hover { background: #e2e8f0; color: var(--danger); }

        .control-panel { display: flex; flex-direction: column; gap: 1.25rem; }
        .row { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; font-weight: 700; color: var(--text-sub); }
        
        select { 
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 15px;
            width: 100%;
            cursor: pointer;
        }

        .slider-box {
            background: #f1f5f9;
            padding: 1.25rem;
            border-radius: 16px;
        }
        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }
        .wpm-display { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        
        input[type="range"] { width: 100%; margin: 10px 0; cursor: pointer; }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
        }
        .play-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .stop-btn {
            background: #fee2e2;
            color: var(--danger);
            border: none;
            padding: 16px 20px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .status { text-align: center; font-size: 0.7rem; color: #94a3b8; margin-top: 1rem; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>🌍 English Accent Trainer</h1>
    
    <div class="textarea-container">
        <button class="clear-btn" id="clearBtn">Clear</button>
        <textarea id="textInput" placeholder="Paste English text..."></textarea>
    </div>
    
    <div class="control-panel">
        <div class="row">
            <label>Select Accent (Female preferred)</label>
            <select id="accentSelect">
                <option value="en-US">🇺🇸 American (US)</option>
                <option value="en-GB">🇬🇧 British (UK)</option>
                <option value="en-AU">🇦🇺 Australian (AU)</option>
                <option value="en-IN">🇮🇳 Indian (IN)</option>
                <option value="en-IE">🇮🇪 Irish (IE)</option>
            </select>
        </div>

        <div class="slider-box">
            <div class="slider-header">
                <label>Target Speed</label>
                <div><span class="wpm-display" id="wpmText">150</span> <small>WPM</small></div>
            </div>
            <input type="range" id="wpmSlider" min="70" max="250" step="5" value="150">
        </div>

        <div class="btn-group">
            <button class="play-btn" id="startBtn">▶ Play</button>
            <button class="stop-btn" id="stopBtn">Stop</button>
        </div>
    </div>
    
    <div class="status" id="statusText">Ready</div>
</div>

<script>
    const synth = window.speechSynthesis;
    const textInput = document.getElementById('textInput');
    const accentSelect = document.getElementById('accentSelect');
    const wpmSlider = document.getElementById('wpmSlider');
    const wpmText = document.getElementById('wpmText');
    const statusText = document.getElementById('statusText');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const clearBtn = document.getElementById('clearBtn');

    const BASE_WPM = 150; 
    let voices = [];

    // --- Voice Discovery ---
    function findBestVoice(langCode) {
        voices = synth.getVoices();
        // 1. 言語コードが完全一致する声を探す
        let filtered = voices.filter(v => v.lang.startsWith(langCode));
        
        // 2. その中で"Female"や女声らしい名前を優先
        const femaleNames = ['Samantha', 'Karen', 'Moira', 'Tessa', 'Alice', 'Google UK English Female', 'Veena', 'Victoria'];
        let femaleVoice = filtered.find(v => femaleNames.some(name => v.name.includes(name)));
        
        return femaleVoice || filtered[0]; // 見つからなければその言語の最初の声
    }

    // Chrome対策：音声リストのロードを待機
    window.speechSynthesis.onvoiceschanged = () => { voices = synth.getVoices(); };

    // --- Data Persistence ---
    function saveData() {
        localStorage.setItem('en_player_v5', JSON.stringify({
            text: textInput.value,
            accent: accentSelect.value,
            wpm: wpmSlider.value
        }));
    }

    function loadData() {
        const saved = localStorage.getItem('en_player_v5');
        if (saved) {
            const data = JSON.parse(saved);
            textInput.value = data.text || "";
            accentSelect.value = data.accent || "en-US";
            wpmSlider.value = data.wpm || 150;
            wpmText.textContent = wpmSlider.value;
        }
    }

    // --- Actions ---
    function getRate() {
        return parseFloat(wpmSlider.value) / BASE_WPM;
    }

    startBtn.onclick = () => {
        synth.cancel();
        if (!textInput.value.trim()) return;
        
        const utterance = new SpeechSynthesisUtterance(textInput.value);
        const targetVoice = findBestVoice(accentSelect.value);
        
        if (targetVoice) {
            utterance.voice = targetVoice;
        }
        
        utterance.lang = accentSelect.value;
        utterance.rate = getRate();
        
        utterance.onstart = () => statusText.textContent = `Speaking: ${wpmSlider.value} WPM (${accentSelect.options[accentSelect.selectedIndex].text})`;
        utterance.onend = () => statusText.textContent = "Finished";
        
        synth.speak(utterance);
    };

    stopBtn.onclick = () => {
        synth.cancel();
        statusText.textContent = "Stopped";
    };

    clearBtn.onclick = () => {
        textInput.value = "";
        saveData();
        statusText.textContent = "Cleared";
    };

    [textInput, accentSelect, wpmSlider].forEach(el => {
        el.addEventListener('input', () => {
            wpmText.textContent = wpmSlider.value;
            saveData();
        });
    });

    window.onload = loadData;
</script>

</body>
</html>

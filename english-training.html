<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Training - Background Support</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .app-card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { font-size: 1.25rem; text-align: center; color: #1e293b; margin-bottom: 1.5rem; }
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 1rem;
            resize: none;
        }
        .control-panel { display: flex; flex-direction: column; gap: 1rem; }
        .row { display: flex; align-items: center; justify-content: space-between; }
        label { font-size: 0.85rem; font-weight: 600; color: #64748b; }
        select, input[type="range"] { width: 65%; }
        .repeat-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            color: var(--primary);
            cursor: pointer;
        }
        .main-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .stop-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
        }
        .status { text-align: center; font-size: 0.75rem; color: #94a3b8; margin-top: 1rem; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>🇺🇸 English Training 🇬🇧</h1>
    <textarea id="textInput" placeholder="Enter English text..."></textarea>
    
    <div class="control-panel">
        <div class="row">
            <label>Accent</label>
            <select id="voiceSelect">
                <option value="en-US">American (US)</option>
                <option value="en-GB">British (UK)</option>
            </select>
        </div>

        <div class="row">
            <label>Speed</label>
            <input type="range" id="rateInput" min="0.5" max="2.0" step="0.1" value="1.0">
            <span id="speedVal">1.0x</span>
        </div>

        <div class="row">
            <label class="repeat-toggle">
                <input type="checkbox" id="repeatMode" checked> Loop Playback
            </label>
            <button class="stop-btn" onclick="stopAll()">Stop</button>
        </div>

        <button class="main-btn" onclick="startPlayback()">▶ Start Practice</button>
    </div>
    
    <!-- バックグラウンド維持用の隠しオーディオ -->
    <audio id="silentAudio" loop>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <div class="status" id="statusText">Ready to start</div>
</div>

<script>
    const synth = window.speechSynthesis;
    const silentAudio = document.getElementById('silentAudio');
    const statusText = document.getElementById('statusText');
    const textInput = document.getElementById('textInput');
    const repeatMode = document.getElementById('repeatMode');
    const voiceSelect = document.getElementById('voiceSelect');
    const rateInput = document.getElementById('rateInput');
    const speedVal = document.getElementById('speedVal');

    rateInput.oninput = () => speedVal.textContent = rateInput.value + 'x';

    function startPlayback() {
        if (!textInput.value.trim()) return;
        
        // 1. 無音オーディオを再生（ブラウザの休止を防ぐヒント）
        silentAudio.play().catch(e => console.log("Audio play blocked"));
        
        speak();
    }

    function speak() {
        synth.cancel();
        
        const utterance = new SpeechSynthesisUtterance(textInput.value);
        utterance.lang = voiceSelect.value;
        utterance.rate = parseFloat(rateInput.value);

        utterance.onstart = () => {
            statusText.textContent = "Playing...";
        };

        utterance.onend = () => {
            if (repeatMode.checked) {
                // バックグラウンド時はsetTimeoutが遅れることがあるため即座に再帰
                statusText.textContent = "Repeating...";
                speak();
            } else {
                statusText.textContent = "Finished";
                silentAudio.pause();
            }
        };

        utterance.onerror = (event) => {
            console.error("Speech Error:", event);
            if (repeatMode.checked) speak();
        };

        synth.speak(utterance);
    }

    function stopAll() {
        repeatMode.checked = false;
        synth.cancel();
        silentAudio.pause();
        statusText.textContent = "Stopped";
    }

    // タブが閉じられる時に確実に停止
    window.onbeforeunload = () => {
        synth.cancel();
    };
</script>

</body>
</html>

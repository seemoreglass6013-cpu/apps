<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stealth Drummer Metronome Pro</title>
    <style>
        :root {
            --bg-color: #000000;
            --accent-color: #ff3b30;
            --normal-color: #4cd964;
            --text-stealth: #333333;
            --ui-bg: rgba(30, 30, 30, 0.95);
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 画面上部のプログレスバー */
        .progress-container {
            width: 100%;
            height: 12px;
            background: #111;
            position: fixed;
            top: 44px;
            left: 0;
            z-index: 100;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--normal-color);
        }

        /* メイン表示エリア */
        .display-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 60px;
        }

        .bpm-display {
            font-size: 40vw;
            font-weight: 800;
            color: var(--text-stealth);
            line-height: 0.9;
        }

        .beat-display {
            font-size: 15vw;
            font-weight: 700;
            color: var(--text-stealth);
            margin-top: 10px;
            font-variant-numeric: tabular-nums;
        }

        /* 操作パネル（中央寄せ） */
        .controls-container {
            width: 100%;
            padding: 20px 0 60px 0; /* 下端から少し離す */
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .settings-panel {
            width: 85%;
            margin-bottom: 20px;
            text-align: center;
            transition: opacity 0.3s;
        }

        .playing .settings-panel {
            opacity: 0;
            pointer-events: none;
        }

        /* メモリーボタン */
        .memory-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 15px;
        }

        .mem-btn {
            flex: 1;
            margin: 0 5px;
            padding: 10px 0;
            background: #222;
            border: 1px solid #444;
            color: #888;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .mem-btn.active {
            border-color: #0a84ff;
            color: #0a84ff;
        }

        input[type="range"] {
            width: 100%;
            height: 45px;
            margin: 10px 0;
            accent-color: #0a84ff;
        }

        /* 巨大ボタン */
        .action-btn {
            width: 88%;
            height: 80px;
            border-radius: 20px;
            border: none;
            font-size: 1.8rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .btn-start { background-color: #30d158; color: white; }
        .btn-stop { background-color: #ff453a; color: white; }

        .action-btn:active { transform: scale(0.96); }

        .hint-text {
            color: #444;
            font-size: 0.7rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="display-area">
        <div class="bpm-display" id="bpmLabel">120</div>
        <div class="beat-display" id="beatLabel">1 / 4</div>
    </div>

    <div class="controls-container" id="controlPanel">
        <div class="settings-panel" id="settingsPanel">
            <div class="memory-row">
                <button class="mem-btn" onclick="handleMemory(0)">M1</button>
                <button class="mem-btn" onclick="handleMemory(1)">M2</button>
                <button class="mem-btn" onclick="handleMemory(2)">M3</button>
            </div>
            <input type="range" id="bpmSlider" min="40" max="250" value="120">
            <div style="color: #666; font-size: 0.8rem; letter-spacing: 1px;" id="tempoName">Allegro</div>
        </div>
        
        <button id="mainBtn" class="action-btn btn-start">START</button>
        <div class="hint-text">Memory: Long press to save BPM</div>
    </div>

<script>
    let bpm = 120;
    let isPlaying = false;
    let currentBeat = 0;
    const beatsPerMeasure = 4;
    let animationId = null;
    let startTime = null;
    
    // メモリーデータ
    let memories = [80, 120, 160];

    const progressBar = document.getElementById('progress-bar');
    const bpmSlider = document.getElementById('bpmSlider');
    const bpmLabel = document.getElementById('bpmLabel');
    const beatLabel = document.getElementById('beatLabel');
    const mainBtn = document.getElementById('mainBtn');
    const tempoName = document.getElementById('tempoName');
    const controlPanel = document.getElementById('controlPanel');
    const memBtns = document.querySelectorAll('.mem-btn');

    // 初期化：ローカルストレージから読み込み
    function init() {
        const savedBpm = localStorage.getItem('metronome_last_bpm');
        if (savedBpm) updateBPM(parseInt(savedBpm));

        const savedMems = localStorage.getItem('metronome_memories');
        if (savedMems) {
            memories = JSON.parse(savedMems);
            updateMemoryLabels();
        }
    }

    function getTempoLabel(val) {
        if (val < 60) return "Largo";
        if (val < 76) return "Adagio";
        if (val < 108) return "Andante";
        if (val < 120) return "Moderato";
        if (val < 156) return "Allegro";
        return "Presto";
    }

    function updateBPM(val) {
        bpm = val;
        bpmSlider.value = val;
        bpmLabel.innerText = val;
        tempoName.innerText = getTempoLabel(val);
        localStorage.setItem('metronome_last_bpm', val);
    }

    function updateMemoryLabels() {
        memBtns.forEach((btn, i) => {
            btn.innerText = `M${i+1}: ${memories[i]}`;
        });
    }

    // メモリー操作（タップで呼び出し、長押しで保存）
    let pressTimer;
    function handleMemory(index) {
        updateBPM(memories[index]);
    }

    memBtns.forEach((btn, i) => {
        btn.addEventListener('touchstart', () => {
            pressTimer = setTimeout(() => {
                memories[i] = parseInt(bpm);
                localStorage.setItem('metronome_memories', JSON.stringify(memories));
                updateMemoryLabels();
                // 視覚的なフィードバック
                btn.style.backgroundColor = "#444";
                setTimeout(() => btn.style.backgroundColor = "#222", 200);
            }, 800);
        });
        btn.addEventListener('touchend', () => clearTimeout(pressTimer));
    });

    function animate(timestamp) {
        if (!startTime) startTime = timestamp;
        const beatDuration = 60000 / bpm;
        const elapsed = timestamp - startTime;
        let progress = (elapsed / beatDuration) * 100;

        if (progress >= 100) {
            currentBeat = (currentBeat % beatsPerMeasure) + 1;
            startTime = timestamp;
            progress = 0;
            beatLabel.innerText = currentBeat + " / " + beatsPerMeasure;
            
            if (currentBeat === 1) {
                beatLabel.style.color = "#ff3b30";
                setTimeout(() => { if(isPlaying) beatLabel.style.color = "var(--text-stealth)"; }, 150);
            }
        }
        progressBar.style.width = progress + '%';
        progressBar.style.backgroundColor = (currentBeat === 1) ? 'var(--accent-color)' : 'var(--normal-color)';
        animationId = requestAnimationFrame(animate);
    }

    bpmSlider.addEventListener('input', (e) => updateBPM(e.target.value));

    mainBtn.addEventListener('click', () => {
        if (isPlaying) {
            cancelAnimationFrame(animationId);
            mainBtn.innerText = 'START';
            mainBtn.className = 'action-btn btn-start';
            controlPanel.classList.remove('playing');
            progressBar.style.width = '0%';
            beatLabel.innerText = "1 / 4";
            currentBeat = 0;
        } else {
            startTime = null;
            currentBeat = 0;
            animationId = requestAnimationFrame(animate);
            mainBtn.innerText = 'STOP';
            mainBtn.className = 'action-btn btn-stop';
            controlPanel.classList.add('playing');
        }
        isPlaying = !isPlaying;
    });

    init();
</script>
</body>
</html>

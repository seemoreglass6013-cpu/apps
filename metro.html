<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stealth Drummer Metronome Final</title>
    <style>
        :root {
            --bg-color: #000000;
            --accent-color: #ff3b30;
            --normal-color: #4cd964;
            --text-stealth: #333333; /* 視認性と隠密性を両立したグレー */
            --ui-bg: rgba(20, 20, 20, 0.98);
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 画面上部のプログレスバー */
        .progress-container {
            width: 100%;
            height: 14px;
            background: #111;
            position: fixed;
            top: 44px; /* iPhoneのステータスバー回避 */
            left: 0;
            z-index: 100;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--normal-color);
        }

        /* メ覚エリア：BPMと拍数 */
        .display-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 20px;
        }

        .bpm-display {
            font-size: 48vw; /* 最大限大きく */
            font-weight: 800;
            color: var(--text-stealth);
            line-height: 1;
            margin-top: 40px;
        }

        .beat-display {
            font-size: 15vw; /* 拍数も大きく */
            font-weight: 700;
            color: var(--text-stealth);
            margin-top: 10px;
            font-variant-numeric: tabular-nums;
        }

        /* 下部操作エリア */
        .controls-container {
            width: 100%;
            background: var(--ui-bg);
            padding: 20px 0 calc(30px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 1px solid #222;
        }

        .settings-panel {
            width: 85%;
            margin-bottom: 15px;
            text-align: center;
            transition: opacity 0.3s;
        }

        .playing .settings-panel {
            opacity: 0;
            pointer-events: none;
            height: 0;
            margin: 0;
        }

        .tempo-name {
            font-size: 1.1rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input[type="range"] {
            width: 100%;
            height: 45px;
            margin: 15px 0;
            accent-color: #0a84ff;
        }

        /* 巨大ボタン */
        .action-btn {
            width: 88%;
            height: 90px;
            border-radius: 20px;
            border: none;
            font-size: 2rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.3s;
        }

        .btn-start {
            background-color: #30d158;
            color: white;
        }

        .btn-stop {
            background-color: #ff453a;
            color: white;
        }

        .action-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="display-area">
        <div class="bpm-display" id="bpmLabel">120</div>
        <div class="beat-display" id="beatLabel">1 / 4</div>
    </div>

    <div class="controls-container" id="controlPanel">
        <div class="settings-panel" id="settingsPanel">
            <div class="tempo-name" id="tempoName">Allegro</div>
            <input type="range" id="bpmSlider" min="40" max="250" value="120">
        </div>
        
        <button id="mainBtn" class="action-btn btn-start">START</button>
    </div>

<script>
    let bpm = 120;
    let isPlaying = false;
    let currentBeat = 0;
    const beatsPerMeasure = 4;
    let animationId = null;
    let startTime = null;

    const progressBar = document.getElementById('progress-bar');
    const bpmSlider = document.getElementById('bpmSlider');
    const bpmLabel = document.getElementById('bpmLabel');
    const beatLabel = document.getElementById('beatLabel');
    const mainBtn = document.getElementById('mainBtn');
    const tempoName = document.getElementById('tempoName');
    const controlPanel = document.getElementById('controlPanel');

    function getTempoLabel(val) {
        if (val < 60) return "Grave / Largo";
        if (val < 76) return "Adagio";
        if (val < 108) return "Andante";
        if (val < 120) return "Moderato";
        if (val < 156) return "Allegro";
        if (val < 200) return "Presto";
        return "Prestissimo";
    }

    function animate(timestamp) {
        if (!startTime) startTime = timestamp;
        const beatDuration = 60000 / bpm;
        const elapsed = timestamp - startTime;
        
        let progress = (elapsed / beatDuration) * 100;

        if (progress >= 100) {
            currentBeat = (currentBeat % beatsPerMeasure) + 1;
            startTime = timestamp;
            progress = 0;
            
            // 拍数の更新
            beatLabel.innerText = currentBeat + " / " + beatsPerMeasure;
            
            // 1拍目の強調
            if (currentBeat === 1) {
                beatLabel.style.color = "#ff3b30"; // 一瞬だけ赤く
                setTimeout(() => { if(isPlaying) beatLabel.style.color = "var(--text-stealth)"; }, 150);
            }
        }

        progressBar.style.width = progress + '%';
        progressBar.style.backgroundColor = (currentBeat === 1) ? 'var(--accent-color)' : 'var(--normal-color)';

        animationId = requestAnimationFrame(animate);
    }

    bpmSlider.addEventListener('input', (e) => {
        bpm = e.target.value;
        bpmLabel.innerText = bpm;
        tempoName.innerText = getTempoLabel(bpm);
    });

    mainBtn.addEventListener('click', () => {
        if (isPlaying) {
            cancelAnimationFrame(animationId);
            mainBtn.innerText = 'START';
            mainBtn.className = 'action-btn btn-start';
            controlPanel.classList.remove('playing');
            progressBar.style.width = '0%';
            beatLabel.innerText = "1 / 4";
            beatLabel.style.color = "var(--text-stealth)";
            currentBeat = 0;
        } else {
            startTime = null;
            currentBeat = 0;
            animationId = requestAnimationFrame(animate);
            mainBtn.innerText = 'STOP';
            mainBtn.className = 'action-btn btn-stop';
            controlPanel.classList.add('playing');
        }
        isPlaying = !isPlaying;
    });

    // 誤操作防止
    document.addEventListener('touchmove', (e) => {
        if (isPlaying) e.preventDefault();
    }, { passive: false });
</script>
</body>
</html>

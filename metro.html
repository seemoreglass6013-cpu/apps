<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stealth Drummer Metronome v2</title>
    <style>
        :root {
            --bg-color: #000000;
            --accent-color: #ff3b30; /* 1拍目：iOSらしい鮮やかな赤 */
            --normal-color: #4cd964; /* 2-4拍目：iOSらしい鮮やかな緑 */
            --text-main: #333333;    /* 数字：視認性を上げたグレー */
            --ui-bg: rgba(28, 28, 30, 0.95);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* プログレスバー：iPhoneのノッチを避ける位置 */
        .progress-container {
            width: 100%;
            height: 12px;
            background: #1c1c1e;
            position: fixed;
            top: 40px; /* ステータスバー付近を避ける */
            left: 0;
            z-index: 100;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--normal-color);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* 巨大なBPM表示：縦画面いっぱいに */
        .bpm-display {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 45vw; /* 縦画面で最大化 */
            font-weight: 800;
            color: var(--text-main);
            z-index: 1;
            font-variant-numeric: tabular-nums;
        }

        /* 下部操作エリア */
        .controls-wrapper {
            width: 100%;
            z-index: 10;
            background: var(--ui-bg);
            padding: 20px 0 calc(20px + env(safe-area-inset-bottom));
            border-top: 1px solid #38383a;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 演奏中に設定を隠す */
        .controls-wrapper.playing .settings {
            display: none;
        }

        .settings {
            width: 85%;
            text-align: center;
        }

        input[type="range"] {
            width: 100%;
            height: 40px;
            margin: 20px 0;
            accent-color: #0a84ff;
        }

        .tempo-info {
            font-size: 1.2rem;
            font-weight: 600;
            color: #8e8e93;
            margin-bottom: 10px;
        }

        /* 巨大なSTOP/STARTボタン */
        .action-btn {
            width: 85%;
            height: 80px;
            border-radius: 16px;
            border: none;
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-start {
            background-color: #30d158;
            color: white;
        }

        .btn-stop {
            background-color: #ff453a;
            color: white;
        }

        .action-btn:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        /* 拍子インジケーター（簡易） */
        .beat-indicator {
            position: absolute;
            top: 65%;
            font-size: 2rem;
            font-weight: bold;
            color: #444;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="bpm-display" id="bpmLabel">120</div>
    <div class="beat-indicator" id="beatNumber">1 / 4</div>

    <div class="controls-wrapper" id="uiWrapper">
        <div class="settings">
            <div class="tempo-info" id="tempoName">Allegro</div>
            <input type="range" id="bpmSlider" min="40" max="250" value="120">
        </div>
        
        <button id="mainBtn" class="action-btn btn-start">START</button>
    </div>

<script>
    let bpm = 120;
    let isPlaying = false;
    let currentBeat = 0;
    const beatsPerMeasure = 4;
    let animationId = null;
    let startTime = null;

    const progressBar = document.getElementById('progress-bar');
    const bpmSlider = document.getElementById('bpmSlider');
    const bpmLabel = document.getElementById('bpmLabel');
    const mainBtn = document.getElementById('mainBtn');
    const tempoName = document.getElementById('tempoName');
    const uiWrapper = document.getElementById('uiWrapper');
    const beatNumber = document.getElementById('beatNumber');

    function getTempoLabel(val) {
        if (val < 60) return "Grave / Largo";
        if (val < 76) return "Adagio";
        if (val < 108) return "Andante";
        if (val < 120) return "Moderato";
        if (val < 156) return "Allegro";
        if (val < 200) return "Presto";
        return "Prestissimo";
    }

    function animate(timestamp) {
        if (!startTime) startTime = timestamp;
        const beatDuration = 60000 / bpm;
        const elapsed = timestamp - startTime;
        
        let progress = (elapsed / beatDuration) * 100;

        if (progress >= 100) {
            currentBeat = (currentBeat % beatsPerMeasure) + 1;
            startTime = timestamp;
            progress = 0;
            
            // 視覚的強調（ノッチ付近のバー）
            const isAccent = (currentBeat === 1);
            beatNumber.innerText = currentBeat + " / " + beatsPerMeasure;
            beatNumber.style.color = isAccent ? '#ff3b30' : '#4cd964';
        }

        progressBar.style.width = progress + '%';
        const isAccentBeat = (currentBeat === 1);
        progressBar.style.backgroundColor = isAccentBeat ? 'var(--accent-color)' : 'var(--normal-color)';

        animationId = requestAnimationFrame(animate);
    }

    bpmSlider.addEventListener('input', (e) => {
        bpm = e.target.value;
        bpmLabel.innerText = bpm;
        tempoName.innerText = getTempoLabel(bpm);
    });

    mainBtn.addEventListener('click', () => {
        if (isPlaying) {
            // STOP処理
            cancelAnimationFrame(animationId);
            mainBtn.innerText = 'START';
            mainBtn.className = 'action-btn btn-start';
            uiWrapper.classList.remove('playing');
            progressBar.style.width = '0%';
            currentBeat = 0;
            beatNumber.innerText = "1 / 4";
            beatNumber.style.color = "#444";
        } else {
            // START処理
            startTime = null;
            currentBeat = 0;
            animationId = requestAnimationFrame(animate);
            mainBtn.innerText = 'STOP';
            mainBtn.className = 'action-btn btn-stop';
            uiWrapper.classList.add('playing');
        }
        isPlaying = !isPlaying;
    });

    // iPhoneのスクロールによるズレを防止
    document.addEventListener('touchmove', (e) => {
        if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Speech Coach (CEFR B1)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Lucide icons as components
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    const icon = lucide.icons[name];
                    if (icon) {
                        const svg = lucide.createIcons({
                            icons: { [name]: icon },
                            attrs: { strokeWidth: 2, width: size, height: size }
                        });
                    }
                }
            }, [name, size]);
            return <i data-lucide={name} className={className} ref={iconRef}></i>;
        };

        const apiKey = ""; // Runtime provides the key

        const App = () => {
            const [isRecording, setIsRecording] = useState(false);
            const [timeLeft, setTimeLeft] = useState(60);
            const [audioUrl, setAudioUrl] = useState(null);
            const [transcript, setTranscript] = useState('');
            const [analysis, setAnalysis] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [error, setError] = useState(null);

            const mediaRecorderRef = useRef(null);
            const audioChunksRef = useRef([]);
            const timerRef = useRef(null);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorderRef.current = new MediaRecorder(stream);
                    audioChunksRef.current = [];

                    mediaRecorderRef.current.ondataavailable = (event) => {
                        audioChunksRef.current.push(event.data);
                    };

                    mediaRecorderRef.current.onstop = () => {
                        const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/wav' });
                        const url = URL.createObjectURL(audioBlob);
                        setAudioUrl(url);
                        handleAnalysis(audioBlob);
                    };

                    mediaRecorderRef.current.start();
                    setIsRecording(true);
                    setTimeLeft(60);
                    setTranscript('');
                    setAnalysis(null);
                    setError(null);

                    timerRef.current = setInterval(() => {
                        setTimeLeft((prev) => {
                            if (prev <= 1) {
                                stopRecording();
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                } catch (err) {
                    setError("マイクへのアクセスを許可してください。ブラウザの設定を確認してください。");
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current && isRecording) {
                    mediaRecorderRef.current.stop();
                    mediaRecorderRef.current.stream.getTracks().forEach(track => track.stop());
                    clearInterval(timerRef.current);
                    setIsRecording(false);
                }
            };

            const handleAnalysis = async (audioBlob) => {
                setIsProcessing(true);
                setTranscript("AIがスピーチを解析中...");

                try {
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = async () => {
                        const base64Data = reader.result.split(',')[1];
                        
                        const systemInstruction = `You are an expert English language coach. Analyze the user's speech based on CEFR B1 level criteria. 
                        Respond in JSON format with these keys: 
                        "transcription" (raw text), 
                        "cefr_evaluation" (assessment in Japanese), 
                        "grammar_tips" (array of strings in Japanese), 
                        "vocabulary_upgrades" (object of original: upgrade), 
                        "improved_version" (B1+ level English rewrite).`;

                        const callApi = async () => {
                            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    contents: [{
                                        parts: [
                                            { text: "Analyze this speech for CEFR B1 goal." },
                                            { inlineData: { mimeType: "audio/wav", data: base64Data } }
                                        ]
                                    }],
                                    systemInstruction: { parts: [{ text: systemInstruction }] },
                                    generationConfig: { responseMimeType: "application/json" }
                                })
                            });

                            if (!response.ok) throw new Error('API Error');
                            const result = await response.json();
                            return JSON.parse(result.candidates?.[0]?.content?.parts?.[0]?.text);
                        };

                        const executeWithRetry = async (retryCount) => {
                            try { return await callApi(); } catch (err) {
                                if (retryCount < 5) {
                                    await new Promise(res => setTimeout(res, Math.pow(2, retryCount) * 1000));
                                    return executeWithRetry(retryCount + 1);
                                }
                                throw err;
                            }
                        };

                        try {
                            const data = await executeWithRetry(0);
                            setTranscript(data.transcription);
                            setAnalysis(data);
                        } catch (err) {
                            setError("解析に失敗しました。インターネット接続を確認して再度お試しください。");
                            setTranscript("");
                        } finally {
                            setIsProcessing(false);
                        }
                    };
                } catch (err) {
                    setIsProcessing(false);
                    setError("ファイル処理エラーが発生しました。");
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-4 md:p-8">
                    <div className="max-w-2xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
                        <div className="bg-gradient-to-r from-blue-600 to-indigo-700 p-8 text-white flex justify-between items-start">
                            <div>
                                <h1 className="text-3xl font-bold mb-1 tracking-tight">English Coach</h1>
                                <p className="text-blue-100 opacity-90">目標: CEFR B1 レベル向上</p>
                            </div>
                            <Icon name="award" size={48} className="opacity-20" />
                        </div>

                        <div className="p-8 space-y-8">
                            <div className="flex flex-col items-center">
                                <div className={`text-7xl font-mono font-black tabular-nums ${timeLeft <= 10 ? 'text-red-500' : 'text-slate-800'}`}>
                                    {formatTime(timeLeft)}
                                </div>
                                <div className="text-slate-400 mt-2 text-xs uppercase tracking-widest font-bold">Countdown</div>
                            </div>

                            <div className="flex justify-center items-center gap-8">
                                {!isRecording ? (
                                    <button onClick={startRecording} className="w-24 h-24 bg-red-500 hover:bg-red-600 text-white rounded-full flex items-center justify-center shadow-2xl transition hover:scale-105 active:scale-95">
                                        <Icon name="mic" size={40} />
                                    </button>
                                ) : (
                                    <button onClick={stopRecording} className="w-24 h-24 bg-slate-900 text-white rounded-full flex items-center justify-center shadow-2xl animate-pulse">
                                        <Icon name="square" size={36} />
                                    </button>
                                )}
                                {(audioUrl || transcript) && !isRecording && (
                                    <button onClick={() => { setAudioUrl(null); setTranscript(''); setAnalysis(null); setTimeLeft(60); }} className="text-slate-300 hover:text-slate-600 transition">
                                        <Icon name="rotate-ccw" size={28} />
                                    </button>
                                )}
                            </div>

                            {error && <div className="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded-r-lg text-sm animate-shake">{error}</div>}

                            {(audioUrl || isProcessing || analysis) && (
                                <div className="space-y-6">
                                    {audioUrl && <audio src={audioUrl} controls className="w-full h-10 rounded-lg bg-slate-50" />}
                                    
                                    <div className="space-y-2">
                                        <div className="flex items-center gap-2 font-bold text-slate-800">
                                            <Icon name="file-text" size={18} className="text-indigo-500" />
                                            <h2>文字起こし</h2>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-slate-700 italic">
                                            {transcript || "解析を待っています..."}
                                        </div>
                                    </div>

                                    {analysis && (
                                        <div className="grid grid-cols-1 gap-4">
                                            <div className="bg-indigo-50 p-5 rounded-2xl border border-indigo-100">
                                                <h3 className="font-bold text-indigo-700 flex items-center gap-2 mb-2">
                                                    <Icon name="award" size={18} /> CEFR評価
                                                </h3>
                                                <p className="text-indigo-900 text-sm leading-relaxed">{analysis.cefr_evaluation}</p>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div className="bg-amber-50 p-5 rounded-2xl border border-amber-100">
                                                    <h3 className="font-bold text-amber-700 flex items-center gap-2 mb-2">
                                                        <Icon name="lightbulb" size={18} /> 文法アドバイス
                                                    </h3>
                                                    <ul className="text-xs text-amber-900 space-y-1">
                                                        {analysis.grammar_tips?.map((t, i) => <li key={i}>• {t}</li>)}
                                                    </ul>
                                                </div>
                                                <div className="bg-emerald-50 p-5 rounded-2xl border border-emerald-100">
                                                    <h3 className="font-bold text-emerald-700 flex items-center gap-2 mb-2">
                                                        <Icon name="message-square" size={18} /> 単語の格上げ
                                                    </h3>
                                                    <div className="text-xs space-y-1">
                                                        {Object.entries(analysis.vocabulary_upgrades || {}).map(([o, n], i) => (
                                                            <div key={i} className="flex justify-between border-b border-emerald-100 pb-1">
                                                                <span className="line-through text-slate-400">{o}</span>
                                                                <span className="font-bold text-emerald-700">→ {n}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-slate-900 p-6 rounded-2xl text-slate-100 shadow-xl">
                                                <h3 className="text-blue-400 font-bold flex items-center gap-2 mb-3">
                                                    <Icon name="check-circle-2" size={18} /> 推奨リライト (B1+)
                                                </h3>
                                                <p className="text-sm italic opacity-90 leading-relaxed">"{analysis.improved_version}"</p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

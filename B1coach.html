<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Coach - Stable Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .loading-dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const apiKey = ""; // Runtime provides the key

        const App = () => {
            const [isRecording, setIsRecording] = useState(false);
            const [timeLeft, setTimeLeft] = useState(60);
            const [transcript, setTranscript] = useState('');
            const [analysis, setAnalysis] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [error, setError] = useState(null);

            const recognitionRef = useRef(null);
            const timerRef = useRef(null);

            // 高精度な音声認識のセットアップ
            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'en-US';

                    recognitionRef.current.onresult = (event) => {
                        let currentText = '';
                        for (let i = 0; i < event.results.length; i++) {
                            currentText += event.results[i][0].transcript + ' ';
                        }
                        setTranscript(currentText);
                    };

                    recognitionRef.current.onerror = (event) => {
                        console.error("Speech Recognition Error:", event.error);
                        if (event.error === 'not-allowed') setError("マイクの使用が許可されていません。");
                    };
                } else {
                    setError("このブラウザは音声認識をサポートしていません。Chromeを使用してください。");
                }
            }, []);

            const startRecording = () => {
                setTranscript('');
                setAnalysis(null);
                setError(null);
                setIsRecording(true);
                setTimeLeft(60);

                try {
                    recognitionRef.current.start();
                    timerRef.current = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                stopRecording();
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                } catch (e) {
                    console.error(e);
                }
            };

            const stopRecording = () => {
                if (isRecording) {
                    recognitionRef.current.stop();
                    clearInterval(timerRef.current);
                    setIsRecording(false);
                    // 録音終了後に自動で解析
                }
            };

            // 手動でも解析を実行できるように
            const triggerAnalysis = async () => {
                if (!transcript || transcript.length < 10) {
                    setError("解析するにはもう少し長く話してください。");
                    return;
                }
                
                setIsAnalyzing(true);
                setError(null);

                const prompt = `
                You are a CEFR B1 English Coach. 
                Analyze this English speech: "${transcript}"
                
                Return ONLY a JSON object with these exact keys:
                {
                  "evaluation": "CEFR B1達成に向けた評価（日本語）",
                  "tips": ["具体的な改善点1", "具体的な改善点2"],
                  "vocabulary": {"used_word": "B1+ upgrade_word"},
                  "rewrite": "A natural B1+ level rewrite of the text"
                }
                `;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { 
                                responseMimeType: "application/json",
                                temperature: 0.7 
                            }
                        })
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error?.message || "API Error");
                    }

                    const result = await response.json();
                    const textResponse = result.candidates[0].content.parts[0].text;
                    setAnalysis(JSON.parse(textResponse));
                } catch (err) {
                    console.error("Analysis Error:", err);
                    setError("解析中にエラーが発生しました。もう一度「解析する」を押してください。");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            useEffect(() => {
                if (!isRecording && transcript.length > 10 && !analysis && !isAnalyzing) {
                    triggerAnalysis();
                }
            }, [isRecording]);

            return (
                <div className="min-h-screen bg-slate-50 flex justify-center p-4">
                    <div className="max-w-xl w-full bg-white rounded-3xl shadow-xl overflow-hidden self-start mt-8">
                        <div className="bg-blue-600 p-6 text-white text-center">
                            <h1 className="text-2xl font-black tracking-tight">ENGLISH B1 COACH</h1>
                            <p className="text-blue-100 text-xs mt-1">Goal: Advanced B1 by Oct 2026</p>
                        </div>

                        <div className="p-6 space-y-6">
                            {/* Timer and Status */}
                            <div className="flex flex-col items-center py-4">
                                <div className={`text-6xl font-mono font-bold ${timeLeft <= 10 && isRecording ? 'text-red-500' : 'text-slate-800'}`}>
                                    {Math.floor(timeLeft / 60)}:{(timeLeft % 60).toString().padStart(2, '0')}
                                </div>
                                <div className="mt-2 flex items-center gap-2">
                                    {isRecording && <span className="flex h-3 w-3 rounded-full bg-red-500 animate-pulse"></span>}
                                    <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">
                                        {isRecording ? "Recording..." : isAnalyzing ? "AI Analyzing..." : "Ready"}
                                    </span>
                                </div>
                            </div>

                            {/* Main Button */}
                            <div className="flex justify-center">
                                {!isRecording ? (
                                    <button 
                                        onClick={startRecording}
                                        disabled={isAnalyzing}
                                        className="w-20 h-20 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-lg hover:bg-blue-700 transition active:scale-95 disabled:opacity-50"
                                    >
                                        <Icon name="mic" size={32} />
                                    </button>
                                ) : (
                                    <button 
                                        onClick={stopRecording}
                                        className="w-20 h-20 bg-slate-900 text-white rounded-full flex items-center justify-center shadow-lg animate-pulse"
                                    >
                                        <Icon name="square" size={28} />
                                    </button>
                                )}
                            </div>

                            {error && (
                                <div className="bg-red-50 text-red-600 p-4 rounded-xl text-xs border border-red-100 flex items-start gap-2">
                                    <Icon name="alert-circle" size={16} className="shrink-0" />
                                    <span>{error}</span>
                                </div>
                            )}

                            {/* Transcript Box */}
                            <div className="space-y-2">
                                <div className="flex justify-between items-center text-slate-500 text-xs font-bold uppercase">
                                    <span>Your Speech</span>
                                    {transcript.length > 0 && !isRecording && !isAnalyzing && !analysis && (
                                        <button onClick={triggerAnalysis} className="text-blue-600 hover:underline">Retry Analysis</button>
                                    )}
                                </div>
                                <div className="bg-slate-50 p-4 rounded-2xl min-h-[100px] text-slate-700 border border-slate-100 leading-relaxed shadow-inner">
                                    {transcript || <span className="text-slate-300">Start talking to see transcription...</span>}
                                </div>
                            </div>

                            {/* Analysis Result */}
                            {isAnalyzing && (
                                <div className="space-y-4 py-4">
                                    <div className="h-4 bg-slate-100 rounded-full w-full overflow-hidden">
                                        <div className="h-full bg-blue-500 w-1/2 animate-[shimmer_1.5s_infinite] origin-left"></div>
                                    </div>
                                    <p className="text-center text-xs text-slate-400 font-medium">AI Coach is evaluating your CEFR B1 progress...</p>
                                </div>
                            )}

                            {analysis && (
                                <div className="space-y-6 pt-4 border-t border-slate-100 animate-in fade-in duration-700">
                                    <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100">
                                        <h3 className="text-blue-800 font-bold text-sm mb-2 flex items-center gap-2">
                                            <Icon name="award" /> Coach's Evaluation
                                        </h3>
                                        <p className="text-blue-900 text-sm leading-relaxed">{analysis.evaluation}</p>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-amber-50 p-4 rounded-2xl border border-amber-100">
                                            <h4 className="text-amber-800 font-bold text-xs mb-3 flex items-center gap-2">
                                                <Icon name="check-circle" /> Key Improvements
                                            </h4>
                                            <ul className="text-xs text-amber-900 space-y-2">
                                                {analysis.tips.map((tip, i) => <li key={i} className="flex gap-2"><span>•</span>{tip}</li>)}
                                            </ul>
                                        </div>
                                        <div className="bg-emerald-50 p-4 rounded-2xl border border-emerald-100">
                                            <h4 className="text-emerald-800 font-bold text-xs mb-3 flex items-center gap-2">
                                                <Icon name="trending-up" /> Word Upgrades
                                            </h4>
                                            <div className="space-y-2">
                                                {Object.entries(analysis.vocabulary).map(([old, updated], i) => (
                                                    <div key={i} className="flex justify-between items-center text-[10px] border-b border-emerald-100 pb-1">
                                                        <span className="text-slate-400 line-through">{old}</span>
                                                        <span className="font-bold text-emerald-700">{updated}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-900 p-6 rounded-2xl text-slate-100 shadow-xl">
                                        <h4 className="text-blue-400 font-bold text-xs mb-3 uppercase tracking-widest">Recommended B1+ Rewrite</h4>
                                        <p className="text-sm italic leading-relaxed opacity-90">"{analysis.rewrite}"</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

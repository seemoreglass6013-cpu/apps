<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Coach B1 - Ultra Stable</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
        .animate-progress { animation: progress 60s linear forwards; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const apiKey = ""; // Runtime provides the key

        const App = () => {
            const [isRecording, setIsRecording] = useState(false);
            const [timeLeft, setTimeLeft] = useState(60);
            const [transcript, setTranscript] = useState('');
            const [analysis, setAnalysis] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [error, setError] = useState(null);

            const recognitionRef = useRef(null);
            const timerRef = useRef(null);

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'en-US';
                    recognitionRef.current.onresult = (event) => {
                        let text = '';
                        for (let i = 0; i < event.results.length; i++) {
                            text += event.results[i][0].transcript + ' ';
                        }
                        setTranscript(text);
                    };
                }
            }, []);

            const stopAll = () => {
                console.log("Stopping all processes...");
                if (recognitionRef.current) {
                    try { recognitionRef.current.stop(); } catch(e) {}
                }
                if (timerRef.current) clearInterval(timerRef.current);
                setIsRecording(false);
            };

            const startRecording = () => {
                setError(null);
                setAnalysis(null);
                setTranscript('');
                setTimeLeft(60);
                setIsRecording(true);

                try {
                    recognitionRef.current.start();
                    timerRef.current = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                stopAll();
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                } catch (e) {
                    setError("マイクの起動に失敗しました。");
                    setIsRecording(false);
                }
            };

            const handleAnalyze = async (textData) => {
                if (!textData || textData.length < 5) {
                    setError("スピーチが短すぎます。もう一度録音してください。");
                    return;
                }
                setIsAnalyzing(true);
                setError(null);

                const prompt = `Analyze this English for CEFR B1 goal: "${textData}". 
                Response MUST be JSON: {"eval":"Assessment(JP)","tips":["Tip(JP)"],"vocab":{"old":"new"},"rewrite":"B1+ English"}`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) throw new Error("API Connection Failed");
                    const res = await response.json();
                    const data = JSON.parse(res.candidates[0].content.parts[0].text);
                    setAnalysis(data);
                } catch (err) {
                    setError("解析エラー。右上のボタンで再試行してください。");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            // 録音が止まったら自動で解析へ
            useEffect(() => {
                if (!isRecording && transcript.length > 5 && !analysis && !isAnalyzing) {
                    handleAnalyze(transcript);
                }
            }, [isRecording]);

            return (
                <div className="min-h-screen bg-slate-100 flex justify-center items-start p-4">
                    <div className="max-w-lg w-full bg-white rounded-3xl shadow-2xl overflow-hidden mt-6">
                        <div className="bg-indigo-600 p-6 text-white text-center relative">
                            <h1 className="text-xl font-black">B1 ENGLISH COACH</h1>
                            <div className="text-[10px] opacity-70 mt-1">Target: CEFR B1+ by Oct 2026</div>
                        </div>

                        {isRecording && <div className="h-1 bg-indigo-200 w-full"><div className="h-full bg-red-500 animate-progress"></div></div>}

                        <div className="p-6 space-y-6">
                            <div className="text-center">
                                <div className={`text-6xl font-mono font-bold ${timeLeft <= 10 ? 'text-red-600' : 'text-slate-800'}`}>
                                    0:{timeLeft.toString().padStart(2, '0')}
                                </div>
                                <p className="text-[10px] text-slate-400 font-bold mt-2 uppercase tracking-tighter">
                                    {isRecording ? "Recording Now..." : isAnalyzing ? "Analyzing..." : "Ready to Start"}
                                </p>
                            </div>

                            <div className="flex justify-center">
                                {!isRecording ? (
                                    <button onClick={startRecording} disabled={isAnalyzing} className="w-20 h-20 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-xl hover:bg-indigo-700 transition active:scale-90 disabled:opacity-30">
                                        <Icon name="mic" size={32} />
                                    </button>
                                ) : (
                                    <button onClick={stopAll} className="w-20 h-20 bg-slate-900 text-white rounded-full flex items-center justify-center shadow-xl animate-pulse">
                                        <Icon name="square" size={24} />
                                    </button>
                                )}
                            </div>

                            {error && <div className="p-3 bg-red-50 text-red-600 text-xs rounded-xl border border-red-100 flex justify-between items-center">
                                <span>{error}</span>
                                <button onClick={() => handleAnalyze(transcript)} className="underline font-bold">Retry</button>
                            </div>}

                            <div className="space-y-2">
                                <label className="text-[10px] font-bold text-slate-400 uppercase">Transcription</label>
                                <div className="bg-slate-50 p-4 rounded-2xl min-h-[100px] text-sm text-slate-600 border border-slate-200 leading-relaxed italic">
                                    {transcript || "Waiting for speech..."}
                                </div>
                            </div>

                            {isAnalyzing && <div className="flex justify-center py-4"><div className="w-6 h-6 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div></div>}

                            {analysis && (
                                <div className="space-y-4 pt-4 border-t animate-in fade-in duration-500">
                                    <div className="bg-indigo-50 p-4 rounded-xl">
                                        <h3 className="text-indigo-800 font-bold text-xs mb-1 flex items-center gap-2"><Icon name="award" size={14} /> Evaluation</h3>
                                        <p className="text-xs text-indigo-900 leading-relaxed">{analysis.eval}</p>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-amber-50 p-3 rounded-xl border border-amber-100">
                                            <h4 className="text-amber-800 font-bold text-[10px] mb-2 uppercase">Tips</h4>
                                            <ul className="text-[10px] text-amber-900 space-y-1">
                                                {analysis.tips.map((t, i) => <li key={i}>• {t}</li>)}
                                            </ul>
                                        </div>
                                        <div className="bg-emerald-50 p-3 rounded-xl border border-emerald-100">
                                            <h4 className="text-emerald-800 font-bold text-[10px] mb-2 uppercase">Vocab</h4>
                                            {Object.entries(analysis.vocab).map(([o, n], i) => (
                                                <div key={i} className="text-[9px] flex justify-between border-b border-emerald-100 mb-1 pb-1">
                                                    <span className="line-through text-slate-400">{o}</span>
                                                    <span className="font-bold">{n}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-slate-900 p-4 rounded-xl shadow-lg">
                                        <h4 className="text-blue-400 font-bold text-[10px] mb-2 uppercase tracking-widest">Improved B1+ Version</h4>
                                        <p className="text-xs text-slate-200 italic leading-relaxed opacity-90">"{analysis.rewrite}"</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

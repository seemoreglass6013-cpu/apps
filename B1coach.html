<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Coach B1 - Enhanced Status</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
        .animate-progress { animation: progress 60s linear forwards; }
        .dot-flashing {
            position: relative;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: #4f46e5;
            color: #4f46e5;
            animation: dot-flashing 1s infinite linear alternate;
            animation-delay: .5s;
        }
        .dot-flashing::before, .dot-flashing::after {
            content: '';
            display: inline-block;
            position: absolute;
            top: 0;
        }
        .dot-flashing::before {
            left: -12px;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: #4f46e5;
            color: #4f46e5;
            animation: dot-flashing 1s infinite alternate;
            animation-delay: 0s;
        }
        .dot-flashing::after {
            left: 12px;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: #4f46e5;
            color: #4f46e5;
            animation: dot-flashing 1s infinite alternate;
            animation-delay: 1s;
        }
        @keyframes dot-flashing {
            0% { background-color: #4f46e5; }
            50%, 100% { background-color: #ebebef; }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const apiKey = ""; 

        const App = () => {
            const [isRecording, setIsRecording] = useState(false);
            const [timeLeft, setTimeLeft] = useState(60);
            const [transcript, setTranscript] = useState('');
            const [analysis, setAnalysis] = useState(null);
            const [status, setStatus] = useState('ready'); // ready, recording, processing, retrying, error, success
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(false);

            const recognitionRef = useRef(null);
            const timerRef = useRef(null);
            const finalTranscriptRef = useRef('');

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'en-US';
                    
                    recognitionRef.current.onresult = (event) => {
                        let text = '';
                        for (let i = 0; i < event.results.length; i++) {
                            text += event.results[i][0].transcript + ' ';
                        }
                        setTranscript(text);
                        finalTranscriptRef.current = text;
                    };
                }
            }, []);

            const stopAll = () => {
                if (recognitionRef.current) {
                    try { recognitionRef.current.stop(); } catch(e) {}
                }
                if (timerRef.current) clearInterval(timerRef.current);
                setIsRecording(false);
            };

            const startRecording = () => {
                setError(null);
                setAnalysis(null);
                setTranscript('');
                setCopied(false);
                finalTranscriptRef.current = '';
                setTimeLeft(60);
                setIsRecording(true);
                setStatus('recording');
                try {
                    recognitionRef.current.start();
                    timerRef.current = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                stopAll();
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                } catch (e) {
                    setError("マイクの起動に失敗しました。");
                    setIsRecording(false);
                    setStatus('error');
                }
            };

            const handleCopy = () => {
                if (!transcript) return;
                const textArea = document.createElement("textarea");
                textArea.value = transcript.trim();
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
                document.body.removeChild(textArea);
            };

            const handleAnalyze = async (textToAnalyze) => {
                const cleanText = textToAnalyze.trim();
                if (!cleanText || cleanText.split(' ').length < 2) {
                    setError("解析するにはもう少し話してください。");
                    setStatus('ready');
                    return;
                }
                
                setStatus('processing');
                setError(null);

                const prompt = `Analyze this English speech (aiming for CEFR B1+): "${cleanText}".
                Response MUST be valid JSON with:
                "eval": Feedback in Japanese.
                "tips": 2 improvement points in Japanese.
                "vocab": Map of 3 vocabulary upgrades.
                "rewrite": Natural B1+ level rewrite.`;

                const callGemini = async (retries = 3, delay = 2000) => {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                generationConfig: { 
                                    responseMimeType: "application/json",
                                    temperature: 1
                                }
                            })
                        });

                        if (!response.ok) {
                            if (retries > 0) {
                                setStatus('retrying');
                                await new Promise(res => setTimeout(res, delay));
                                return callGemini(retries - 1, delay * 2);
                            }
                            throw new Error(`API Error: ${response.status}`);
                        }

                        const data = await response.json();
                        const result = JSON.parse(data.candidates[0].content.parts[0].text);
                        setAnalysis(result);
                        setStatus('success');
                    } catch (err) {
                        console.error("Gemini Error:", err);
                        setError("接続エラーが発生しました。インターネット環境を確認するか、少し待ってリトライしてください。");
                        setStatus('error');
                    }
                };

                await callGemini();
            };

            useEffect(() => {
                if (!isRecording && finalTranscriptRef.current.length > 5 && !analysis && status === 'recording') {
                    const t = setTimeout(() => handleAnalyze(finalTranscriptRef.current), 1000);
                    return () => clearTimeout(t);
                }
            }, [isRecording]);

            const getStatusLabel = () => {
                switch(status) {
                    case 'recording': return "Listening...";
                    case 'processing': return "Analyzing Speech...";
                    case 'retrying': return "Retrying Connection...";
                    case 'error': return "Analysis Failed";
                    case 'success': return "Analysis Complete";
                    default: return "Ready to Start";
                }
            };

            return (
                <div className="min-h-screen bg-slate-100 flex justify-center items-start p-4">
                    <div className="max-w-lg w-full bg-white rounded-3xl shadow-2xl overflow-hidden mt-6">
                        {/* Header */}
                        <div className="bg-indigo-700 p-6 text-white text-center">
                            <h1 className="text-xl font-black">ENGLISH B1 COACH</h1>
                            <div className="text-[10px] opacity-80 mt-1 font-bold tracking-widest uppercase italic">Road to B1+ (Oct 2026)</div>
                        </div>

                        {/* Progress Bar */}
                        {isRecording && <div className="h-1 bg-indigo-100 w-full"><div className="h-full bg-red-500 animate-progress"></div></div>}

                        <div className="p-6 space-y-6">
                            {/* Timer and Status Indicator */}
                            <div className="text-center space-y-2">
                                <div className={`text-6xl font-mono font-bold ${timeLeft <= 10 && isRecording ? 'text-red-600' : 'text-slate-800'}`}>
                                    0:{timeLeft.toString().padStart(2, '0')}
                                </div>
                                <div className="flex items-center justify-center gap-2">
                                    {(status === 'processing' || status === 'retrying') && <div className="dot-flashing mx-4"></div>}
                                    <p className={`text-[10px] font-black uppercase tracking-widest ${status === 'error' ? 'text-red-500' : 'text-indigo-600'}`}>
                                        {getStatusLabel()}
                                    </p>
                                </div>
                            </div>

                            {/* Control Button */}
                            <div className="flex justify-center">
                                {!isRecording ? (
                                    <button 
                                        onClick={startRecording} 
                                        disabled={status === 'processing' || status === 'retrying'} 
                                        className="w-20 h-20 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-xl hover:bg-indigo-700 transition active:scale-95 disabled:opacity-30 disabled:scale-100"
                                    >
                                        <Icon name="mic" size={32} />
                                    </button>
                                ) : (
                                    <button onClick={stopAll} className="w-20 h-20 bg-slate-900 text-white rounded-full flex items-center justify-center shadow-xl animate-pulse">
                                        <Icon name="square" size={24} />
                                    </button>
                                )}
                            </div>

                            {/* Error Message */}
                            {error && (
                                <div className="p-4 bg-red-50 text-red-700 text-xs rounded-2xl border border-red-100 flex justify-between items-center gap-2 animate-in fade-in duration-300">
                                    <div className="flex items-center gap-2">
                                        <Icon name="alert-circle" size={14} />
                                        <span>{error}</span>
                                    </div>
                                    <button onClick={() => handleAnalyze(transcript)} className="bg-white px-3 py-1 rounded shadow-sm font-bold shrink-0 hover:bg-red-100 transition">Retry</button>
                                </div>
                            )}

                            {/* Transcription Box */}
                            <div className="space-y-2">
                                <div className="flex justify-between items-center px-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Transcription</label>
                                    {transcript && (
                                        <button 
                                            onClick={handleCopy}
                                            className={`flex items-center gap-1 text-[10px] font-bold px-2 py-1 rounded-md transition ${copied ? 'text-emerald-600 bg-emerald-50 border border-emerald-100' : 'text-indigo-600 hover:bg-indigo-50 border border-transparent'}`}
                                        >
                                            <Icon name={copied ? "check" : "copy"} size={12} />
                                            {copied ? "COPIED" : "COPY"}
                                        </button>
                                    )}
                                </div>
                                <div className="bg-slate-50 p-5 rounded-2xl min-h-[120px] text-sm text-slate-700 border border-slate-200 leading-relaxed italic shadow-inner">
                                    {transcript || (isRecording ? "Listening for your voice..." : "Press the mic to start speaking.")}
                                </div>
                            </div>

                            {/* Analysis Result */}
                            {analysis && (
                                <div className="space-y-4 pt-4 border-t border-slate-100 animate-in fade-in slide-in-from-bottom-4 duration-700">
                                    <div className="bg-indigo-50 p-5 rounded-2xl border border-indigo-100 shadow-sm">
                                        <h3 className="text-indigo-800 font-bold text-xs mb-2 flex items-center gap-2">
                                            <Icon name="award" size={14} /> Evaluation
                                        </h3>
                                        <p className="text-xs text-indigo-900 leading-relaxed font-medium">{analysis.eval}</p>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        <div className="bg-amber-50 p-4 rounded-2xl border border-amber-100">
                                            <h4 className="text-amber-800 font-bold text-[10px] mb-2 uppercase flex items-center gap-1">
                                                <Icon name="lightbulb" size={12} /> Key Tips
                                            </h4>
                                            <ul className="text-[11px] text-amber-900 space-y-1">
                                                {analysis.tips.map((t, i) => <li key={i} className="flex gap-1"><span>•</span>{t}</li>)}
                                            </ul>
                                        </div>
                                        <div className="bg-emerald-50 p-4 rounded-2xl border border-emerald-100">
                                            <h4 className="text-emerald-800 font-bold text-[10px] mb-2 uppercase flex items-center gap-1">
                                                <Icon name="zap" size={12} /> Vocabulary
                                            </h4>
                                            <div className="space-y-1">
                                                {Object.entries(analysis.vocab).map(([old, updated], i) => (
                                                    <div key={i} className="flex justify-between items-center text-[10px] border-b border-emerald-100 pb-1">
                                                        <span className="text-slate-400 line-through truncate max-w-[40%]">{old}</span>
                                                        <span className="font-bold text-emerald-700">→ {updated}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-900 p-6 rounded-2xl text-slate-100 shadow-xl relative overflow-hidden group border-t-4 border-indigo-500">
                                        <h4 className="text-indigo-400 font-bold text-[10px] mb-3 uppercase tracking-widest flex items-center gap-2">
                                            <Icon name="check-circle" size={14} /> Recommended B1+ Rewrite
                                        </h4>
                                        <p className="text-sm text-slate-200 italic leading-relaxed opacity-95 relative z-10">"{analysis.rewrite}"</p>
                                        <Icon name="message-square" size={64} className="absolute -right-4 -bottom-4 opacity-5 text-white" />
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

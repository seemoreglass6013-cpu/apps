<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Coach - High Speed Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={`${className} inline-block w-[${size}px] h-[${size}px]`}></i>;
        };

        const apiKey = ""; // Runtime provides the key

        const App = () => {
            const [isRecording, setIsRecording] = useState(false);
            const [timeLeft, setTimeLeft] = useState(60);
            const [audioUrl, setAudioUrl] = useState(null);
            const [transcript, setTranscript] = useState('');
            const [analysis, setAnalysis] = useState(null);
            const [status, setStatus] = useState('ready'); // ready, recording, analyzing, error
            const [error, setError] = useState(null);

            const mediaRecorderRef = useRef(null);
            const recognitionRef = useRef(null);
            const timerRef = useRef(null);

            // ブラウザの音声認識(Web Speech API)のセットアップ
            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'en-US';

                    recognitionRef.current.onresult = (event) => {
                        let finalTranscript = '';
                        for (let i = event.resultIndex; i < event.results.length; ++i) {
                            if (event.results[i].isFinal) {
                                finalTranscript += event.results[i][0].transcript + ' ';
                            }
                        }
                        if (finalTranscript) {
                            setTranscript(prev => prev + finalTranscript);
                        }
                    };
                }
            }, []);

            const startRecording = async () => {
                setTranscript('');
                setAnalysis(null);
                setError(null);
                setAudioUrl(null);

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorderRef.current = new MediaRecorder(stream);
                    const chunks = [];

                    mediaRecorderRef.current.ondataavailable = (e) => chunks.push(e.data);
                    mediaRecorderRef.current.onstop = () => {
                        const blob = new Blob(chunks, { type: 'audio/wav' });
                        setAudioUrl(URL.createObjectURL(blob));
                        // 解析へ進む
                        if (transcript.length > 5) {
                            analyzeText(transcript);
                        } else {
                            setStatus('ready');
                            setError("Speech was too short to analyze.");
                        }
                    };

                    mediaRecorderRef.current.start();
                    if (recognitionRef.current) recognitionRef.current.start();
                    
                    setIsRecording(true);
                    setStatus('recording');
                    setTimeLeft(60);

                    timerRef.current = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                stopRecording();
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                } catch (err) {
                    setError("Microphone access denied.");
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current && isRecording) {
                    mediaRecorderRef.current.stop();
                    if (recognitionRef.current) recognitionRef.current.stop();
                    clearInterval(timerRef.current);
                    setIsRecording(false);
                    setStatus('analyzing');
                }
            };

            const analyzeText = async (textToAnalyze) => {
                setStatus('analyzing');
                
                const systemPrompt = `You are a CEFR B1 English Coach. Analyze the input text.
                Provide feedback in JSON: 
                {"evaluation": "Assessment in Japanese", 
                 "tips": ["Tip 1 in JP", "Tip 2 in JP"], 
                 "vocab": {"old": "advanced_version"}, 
                 "rewrite": "B1+ level rewrite"}`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Analyze my speech to help me reach B1 level: "${textToAnalyze}"` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) throw new Error();
                    const result = await response.json();
                    const data = JSON.parse(result.candidates[0].content.parts[0].text);
                    setAnalysis(data);
                    setStatus('ready');
                } catch (err) {
                    setError("AI analysis failed. The transcript is available above.");
                    setStatus('ready');
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-4 md:p-8">
                    <div className="max-w-2xl w-full bg-white rounded-3xl shadow-xl overflow-hidden">
                        <div className="bg-indigo-600 p-6 text-white text-center">
                            <h1 className="text-2xl font-bold">English Coach B1</h1>
                            <p className="text-indigo-100 text-sm">Real-time Feedback Edition</p>
                        </div>

                        <div className="p-8 space-y-8">
                            {/* Timer */}
                            <div className="text-center">
                                <div className={`text-7xl font-mono font-bold ${timeLeft <= 10 ? 'text-red-500' : 'text-slate-800'}`}>
                                    0:{timeLeft.toString().padStart(2, '0')}
                                </div>
                                {status === 'analyzing' && <div className="text-indigo-500 font-bold animate-pulse mt-2">AI Analyzing...</div>}
                            </div>

                            {/* Controls */}
                            <div className="flex justify-center gap-6">
                                {!isRecording ? (
                                    <button onClick={startRecording} disabled={status === 'analyzing'} className="w-20 h-20 bg-red-500 text-white rounded-full flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 disabled:opacity-50">
                                        <Icon name="mic" size={32} />
                                    </button>
                                ) : (
                                    <button onClick={stopRecording} className="w-20 h-20 bg-slate-900 text-white rounded-full flex items-center justify-center shadow-lg animate-pulse">
                                        <Icon name="square" size={32} />
                                    </button>
                                )}
                            </div>

                            {error && <div className="bg-red-50 text-red-600 p-4 rounded-xl text-sm border border-red-100">{error}</div>}

                            {/* Transcript Area */}
                            <div className="space-y-4">
                                <h2 className="font-bold text-slate-700 flex items-center gap-2">
                                    <Icon name="file-text" size={18} /> Transcript (Real-time)
                                </h2>
                                <div className="bg-slate-50 p-4 rounded-xl min-h-[80px] text-slate-600 border border-slate-100">
                                    {transcript || (isRecording ? "Listening..." : "Your speech will appear here.")}
                                </div>
                            </div>

                            {/* Audio Player */}
                            {audioUrl && (
                                <div className="flex items-center gap-4 bg-indigo-50 p-3 rounded-xl">
                                    <Icon name="play" size={20} className="text-indigo-600" />
                                    <audio src={audioUrl} controls className="w-full h-8" />
                                </div>
                            )}

                            {/* Analysis Section */}
                            {analysis && (
                                <div className="space-y-4 pt-4 border-t border-slate-100">
                                    <div className="bg-white border-2 border-indigo-100 p-5 rounded-2xl shadow-sm">
                                        <h3 className="font-bold text-indigo-700 mb-2">CEFR Assessment</h3>
                                        <p className="text-sm text-slate-700">{analysis.evaluation}</p>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-amber-50 p-4 rounded-xl border border-amber-100">
                                            <h4 className="font-bold text-amber-700 text-sm mb-2">Key Tips</h4>
                                            <ul className="text-xs space-y-1">
                                                {analysis.tips.map((t, i) => <li key={i}>• {t}</li>)}
                                            </ul>
                                        </div>
                                        <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                                            <h4 className="font-bold text-emerald-700 text-sm mb-2">Upgrades</h4>
                                            <div className="text-xs space-y-1">
                                                {Object.entries(analysis.vocab).map(([o, n], i) => (
                                                    <div key={i} className="flex justify-between border-b border-emerald-100">
                                                        <span className="line-through text-slate-400">{o}</span>
                                                        <span className="font-bold">→ {n}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-800 p-5 rounded-2xl text-slate-200">
                                        <h4 className="text-blue-400 font-bold text-sm mb-2">B1+ Recommended Version</h4>
                                        <p className="text-sm italic">"{analysis.rewrite}"</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

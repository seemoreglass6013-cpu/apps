<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Coach B1 - Stable Auth</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
        .animate-progress { animation: progress 60s linear forwards; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const apiKey = ""; // Runtime provides the key

        const App = () => {
            const [isRecording, setIsRecording] = useState(false);
            const [timeLeft, setTimeLeft] = useState(60);
            const [transcript, setTranscript] = useState('');
            const [analysis, setAnalysis] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(false);

            const recognitionRef = useRef(null);
            const timerRef = useRef(null);
            const finalTranscriptRef = useRef('');

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'en-US';
                    
                    recognitionRef.current.onresult = (event) => {
                        let text = '';
                        for (let i = 0; i < event.results.length; i++) {
                            text += event.results[i][0].transcript + ' ';
                        }
                        setTranscript(text);
                        finalTranscriptRef.current = text;
                    };

                    recognitionRef.current.onerror = (e) => {
                        if (e.error !== 'no-speech') {
                            setError(`Speech Recognition Error: ${e.error}`);
                        }
                    };
                }
            }, []);

            const stopAll = () => {
                if (recognitionRef.current) {
                    try { recognitionRef.current.stop(); } catch(e) {}
                }
                if (timerRef.current) clearInterval(timerRef.current);
                setIsRecording(false);
            };

            const startRecording = () => {
                setError(null);
                setAnalysis(null);
                setTranscript('');
                setCopied(false);
                finalTranscriptRef.current = '';
                setTimeLeft(60);
                setIsRecording(true);

                try {
                    recognitionRef.current.start();
                    timerRef.current = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                stopAll();
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                } catch (e) {
                    setError("マイクの起動に失敗しました。");
                    setIsRecording(false);
                }
            };

            const handleCopy = () => {
                if (!transcript) return;
                const textArea = document.createElement("textarea");
                textArea.value = transcript.trim();
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {}
                document.body.removeChild(textArea);
            };

            const handleAnalyze = async (textData) => {
                const cleanText = textData.trim();
                if (!cleanText || cleanText.split(' ').length < 3) {
                    setError("内容が少なすぎるため、解析をスキップしました。");
                    return;
                }
                
                setIsAnalyzing(true);
                setError(null);

                // Use the v1 endpoint and include the prompt as a single unit to maximize compatibility
                const prompt = `You are a CEFR B1 English Coach. Analyze this speech for a student aiming for B1+ level: "${cleanText}".
                Return the response in JSON format ONLY with these keys:
                "eval": A evaluation of their English in Japanese.
                "tips": An array of 2 specific improvement tips in Japanese.
                "vocab": A map of 3 words they used and their B1+ level upgrades.
                "rewrite": A natural B1+ level rewrite of the text.`;

                try {
                    // Using exponential backoff for reliability
                    let response;
                    let retries = 5;
                    let delay = 1000;

                    while (retries > 0) {
                        response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                generationConfig: { 
                                    responseMimeType: "application/json"
                                }
                            })
                        });

                        if (response.ok) break;
                        
                        retries--;
                        if (retries === 0) throw new Error(await response.text());
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }

                    const resData = await response.json();
                    const resultText = resData.candidates[0].content.parts[0].text;
                    setAnalysis(JSON.parse(resultText));
                } catch (err) {
                    console.error("Analysis Error:", err);
                    setError("解析エラーが発生しました。時間をおいて再試行ボタンを押してください。");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            useEffect(() => {
                if (!isRecording && finalTranscriptRef.current.length > 5 && !analysis && !isAnalyzing) {
                    const timer = setTimeout(() => {
                        handleAnalyze(finalTranscriptRef.current);
                    }, 2000);
                    return () => clearTimeout(timer);
                }
            }, [isRecording]);

            return (
                <div className="min-h-screen bg-slate-100 flex justify-center items-start p-4">
                    <div className="max-w-lg w-full bg-white rounded-3xl shadow-2xl overflow-hidden mt-6">
                        <div className="bg-indigo-700 p-6 text-white text-center">
                            <h1 className="text-xl font-black tracking-tight uppercase">English B1 Coach</h1>
                            <div className="text-[10px] opacity-80 mt-1 font-bold tracking-widest">Goal: CEFR B1+ by Oct 2026</div>
                        </div>

                        {isRecording && <div className="h-1 bg-indigo-100 w-full"><div className="h-full bg-red-500 animate-progress"></div></div>}

                        <div className="p-6 space-y-6">
                            <div className="text-center">
                                <div className={`text-6xl font-mono font-bold ${timeLeft <= 10 && isRecording ? 'text-red-600' : 'text-slate-800'}`}>
                                    {Math.floor(timeLeft / 60)}:{(timeLeft % 60).toString().padStart(2, '0')}
                                </div>
                                <p className="text-[10px] text-slate-400 font-bold mt-2 uppercase tracking-widest">
                                    {isRecording ? "Listening..." : isAnalyzing ? "Analyzing..." : "Standby"}
                                </p>
                            </div>

                            <div className="flex justify-center">
                                {!isRecording ? (
                                    <button 
                                        onClick={startRecording} 
                                        disabled={isAnalyzing} 
                                        className="w-20 h-20 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-xl hover:bg-indigo-700 transition active:scale-90 disabled:opacity-30"
                                    >
                                        <Icon name="mic" size={32} />
                                    </button>
                                ) : (
                                    <button 
                                        onClick={stopAll} 
                                        className="w-20 h-20 bg-slate-900 text-white rounded-full flex items-center justify-center shadow-xl animate-pulse"
                                    >
                                        <Icon name="square" size={24} />
                                    </button>
                                )}
                            </div>

                            {error && (
                                <div className="p-4 bg-red-50 text-red-700 text-xs rounded-2xl border border-red-100 flex justify-between items-center gap-2">
                                    <span>{error}</span>
                                    <button onClick={() => handleAnalyze(transcript)} className="bg-white px-3 py-1 rounded shadow-sm font-bold shrink-0">Retry</button>
                                </div>
                            )}

                            <div className="space-y-2">
                                <div className="flex justify-between items-center px-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Transcription</label>
                                    {transcript && (
                                        <button 
                                            onClick={handleCopy}
                                            className={`flex items-center gap-1 text-[10px] font-bold px-2 py-1 rounded-md transition ${copied ? 'text-emerald-600 bg-emerald-50' : 'text-indigo-600 hover:bg-indigo-50'}`}
                                        >
                                            <Icon name={copied ? "check" : "copy"} size={12} />
                                            {copied ? "COPIED" : "COPY"}
                                        </button>
                                    )}
                                </div>
                                <div className="bg-slate-50 p-5 rounded-2xl min-h-[120px] text-sm text-slate-700 border border-slate-200 leading-relaxed italic shadow-inner">
                                    {transcript || (isRecording ? "Listening..." : "Your speech will appear here.")}
                                </div>
                            </div>

                            {isAnalyzing && (
                                <div className="flex flex-col items-center py-4 gap-3">
                                    <div className="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                                    <span className="text-xs text-indigo-600 font-bold">Coach is thinking...</span>
                                </div>
                            )}

                            {analysis && (
                                <div className="space-y-4 pt-4 border-t border-slate-100 animate-in fade-in slide-in-from-bottom-2 duration-700">
                                    <div className="bg-indigo-50 p-5 rounded-2xl border border-indigo-100">
                                        <h3 className="text-indigo-800 font-bold text-xs mb-2 flex items-center gap-2">
                                            <Icon name="award" size={14} /> Evaluation
                                        </h3>
                                        <p className="text-xs text-indigo-900 leading-relaxed">{analysis.eval}</p>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        <div className="bg-amber-50 p-4 rounded-2xl border border-amber-100">
                                            <h4 className="text-amber-800 font-bold text-[10px] mb-2 uppercase flex items-center gap-1">
                                                <Icon name="lightbulb" size={12} /> Tips
                                            </h4>
                                            <ul className="text-xs text-amber-900 space-y-1">
                                                {analysis.tips.map((t, i) => <li key={i}>• {t}</li>)}
                                            </ul>
                                        </div>
                                        <div className="bg-emerald-50 p-4 rounded-2xl border border-emerald-100">
                                            <h4 className="text-emerald-800 font-bold text-[10px] mb-2 uppercase flex items-center gap-1">
                                                <Icon name="trending-up" size={12} /> Vocabulary
                                            </h4>
                                            <div className="space-y-1">
                                                {Object.entries(analysis.vocab).map(([old, updated], i) => (
                                                    <div key={i} className="flex justify-between items-center text-[10px] border-b border-emerald-100 pb-1">
                                                        <span className="text-slate-400 line-through">{old}</span>
                                                        <span className="font-bold text-emerald-700">→ {updated}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-900 p-6 rounded-2xl text-slate-100 shadow-xl relative">
                                        <h4 className="text-blue-400 font-bold text-[10px] mb-3 uppercase tracking-widest flex items-center gap-2">
                                            <Icon name="check-circle" size={14} /> Natural Rewrite
                                        </h4>
                                        <p className="text-sm text-slate-200 italic leading-relaxed opacity-90">"{analysis.rewrite}"</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Coach B1 - Focus Mode</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
        .animate-progress { animation: progress 60s linear forwards; }
        @keyframes flash {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(239, 68, 68, 0.2); }
        }
        .visual-countdown { animation: flash 1s infinite; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const App = () => {
            const [isRecording, setIsRecording] = useState(false);
            const [timeLeft, setTimeLeft] = useState(60);
            const [transcript, setTranscript] = useState('');
            const [copied, setCopied] = useState(false);

            const recognitionRef = useRef(null);
            const timerRef = useRef(null);

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'en-US';
                    
                    recognitionRef.current.onresult = (event) => {
                        let text = '';
                        for (let i = 0; i < event.results.length; i++) {
                            text += event.results[i][0].transcript + ' ';
                        }
                        setTranscript(text);
                    };
                }
            }, []);

            const stopAll = () => {
                if (recognitionRef.current) {
                    try { recognitionRef.current.stop(); } catch(e) {}
                }
                if (timerRef.current) clearInterval(timerRef.current);
                setIsRecording(false);
            };

            const startRecording = () => {
                setTranscript('');
                setCopied(false);
                setTimeLeft(60);
                setIsRecording(true);
                try {
                    recognitionRef.current.start();
                    timerRef.current = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                stopAll();
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                } catch (e) {
                    setIsRecording(false);
                }
            };

            const handleCopy = () => {
                if (!transcript) return;
                const textArea = document.createElement("textarea");
                textArea.value = transcript.trim();
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
                document.body.removeChild(textArea);
            };

            const isLastThreeSeconds = isRecording && timeLeft <= 3 && timeLeft > 0;

            return (
                <div className={`min-h-screen transition-colors duration-300 flex justify-center items-start p-4 ${isLastThreeSeconds ? 'visual-countdown' : 'bg-slate-100'}`}>
                    <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden mt-6 border border-slate-200">
                        <div className="bg-slate-900 p-6 text-white text-center">
                            <h1 className="text-lg font-black tracking-tighter italic">B1 SPEECH RECORDER</h1>
                            <p className="text-[10px] opacity-60 font-medium tracking-widest uppercase">Target 2026.10</p>
                        </div>

                        {isRecording && (
                            <div className="h-1.5 w-full bg-slate-100">
                                <div className={`h-full animate-progress ${timeLeft <= 3 ? 'bg-red-500' : 'bg-indigo-500'}`}></div>
                            </div>
                        )}

                        <div className="p-8 space-y-8">
                            <div className="text-center py-4 relative">
                                {isLastThreeSeconds && (
                                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                        <div className="text-[120px] font-black text-red-500 opacity-20 animate-ping">
                                            {timeLeft}
                                        </div>
                                    </div>
                                )}
                                <div className={`text-8xl font-mono font-black tabular-nums tracking-tighter transition-colors ${timeLeft <= 3 && isRecording ? 'text-red-600' : 'text-slate-900'}`}>
                                    {timeLeft}
                                </div>
                                <p className={`text-[10px] font-bold uppercase tracking-[0.2em] mt-2 ${isLastThreeSeconds ? 'text-red-600' : 'text-slate-400'}`}>
                                    {isRecording ? (timeLeft <= 3 ? "Hurry! Finish up!" : "Recording...") : "Ready to Speak"}
                                </p>
                            </div>

                            <div className="flex justify-center">
                                {!isRecording ? (
                                    <button onClick={startRecording} className="w-24 h-24 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-xl hover:shadow-indigo-200 transition-all active:scale-90">
                                        <Icon name="mic" size={40} />
                                    </button>
                                ) : (
                                    <button onClick={stopAll} className="w-24 h-24 bg-slate-900 text-white rounded-full flex items-center justify-center shadow-xl animate-pulse">
                                        <Icon name="square" size={28} />
                                    </button>
                                )}
                            </div>

                            <div className="space-y-3">
                                <div className="flex justify-between items-end">
                                    <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Transcription</h2>
                                    {transcript && (
                                        <button onClick={handleCopy} className={`flex items-center gap-1 text-[10px] font-bold px-3 py-1.5 rounded-full transition-all ${copied ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                                            <Icon name={copied ? "check" : "copy"} size={12} />
                                            {copied ? "COPIED" : "COPY FOR GEMINI"}
                                        </button>
                                    )}
                                </div>
                                <div className="bg-slate-50 p-6 rounded-3xl min-h-[160px] text-base text-slate-700 leading-relaxed italic border border-slate-100 shadow-inner">
                                    {transcript || "The coach is off. Use the copy button to ask Gemini yourself!"}
                                </div>
                            </div>
                            
                            <div className="bg-indigo-50 p-4 rounded-2xl flex items-start gap-3">
                                <Icon name="info" size={16} className="text-indigo-600 shrink-0 mt-0.5" />
                                <p className="text-[11px] text-indigo-800 leading-snug">
                                    録音終了後、ボタンを押してテキストをコピーし、本家Geminiに<b>「この英文をB1レベルで評価・添削して」</b>と送信してください。
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

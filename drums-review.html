<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drum Hybrid Review 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #1e293b; border-radius: 1rem; border: 1px solid #334155; }
        .input-field { background-color: #2a2a2a; border: 1px solid #444; color: white; }
        .input-field:focus { border-color: #3b82f6; outline: none; }
        .label-text { font-size: 0.75rem; font-weight: bold; color: #94a3b8; text-transform: uppercase; margin-bottom: 0.25rem; display: block; }
        
        /* 3段階評価用のボタンスタイル */
        .rating-group { display: flex; gap: 0.5rem; }
        .rating-btn { flex: 1; padding: 0.6rem; border-radius: 0.75rem; font-size: 0.7rem; font-weight: bold; border: 1px solid #334155; background: #1e293b; color: #64748b; transition: 0.2s; }
        
        .rating-btn.active-bad { background: #451a1a; color: #f87171; border-color: #f87171; }
        .rating-btn.active-good { background: #1e3a8a; color: #60a5fa; border-color: #60a5fa; }
        .rating-btn.active-ex { background: #064e3b; color: #34d399; border-color: #34d399; }
        
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 md:p-8 pb-20">
    <div class="max-w-md mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-black text-blue-400">Drum Hybrid Review</h1>
            <p class="text-xs text-slate-400 tracking-widest uppercase">3-Step Evaluation System</p>
        </header>

        <div class="card p-6 space-y-5 shadow-2xl">
            <section>
                <label class="label-text">Date</label>
                <input type="date" id="practice-date" class="w-full p-3 input-field rounded-xl text-sm" onchange="updateMenuByDate()">
            </section>

            <section>
                <label class="label-text">1. 練習メニュー</label>
                <select id="todo-select" class="w-full p-4 input-field rounded-xl text-sm leading-relaxed" onchange="updateBpmPlaceholder()">
                    <option value="月：ブラシ [基礎] Ritual + StickControl p5">月曜：ブラシ/筋力 (Ritual+SC p5)</option>
                    <option value="火：7A+JLL [ハネ] CrazyArmy + Syncopation">火曜：7A+JLL/独立 (Crazy+Synco 3連)</option>
                    <option value="水：7A [高速] Ritual + StickControl">水曜：7A/脱力高速 (Ritual+SC 高速)</option>
                    <option value="木：5A [ダイナミクス] CrazyArmy + Syncopation">木曜：5A/消音アクセント (Crazy+Synco)</option>
                    <option value="金：5A [持久力] Ritual + Syncopation">金曜：5A/通し完走 (Ritual+Synco)</option>
                    <option value="土：5A/7A [統合] Syncopation 応用">土曜：録音・応用/セット (DT的キメ)</option>
                    <option value="日：自由 [対局] Session / Chess">日曜：自由/Session & Chess</option>
                </select>
            </section>

            <section class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-text">BPM (Main)</label>
                    <input type="number" inputmode="numeric" id="bpm-main" class="w-full p-3 input-field rounded-xl text-sm" placeholder="Ritual等">
                </div>
                <div>
                    <label class="label-text">BPM (Sub)</label>
                    <input type="number" inputmode="numeric" id="bpm-sub" class="w-full p-3 input-field rounded-xl text-sm" placeholder="SC/Synco等">
                </div>
            </section>

            <section class="space-y-4 pt-2">
                <div>
                    <label class="label-text">2-A. シンクロ率 (声・足・手)</label>
                    <div class="rating-group" id="rating-sync">
                        <button onclick="setRating('sync', 'Bad')" class="rating-btn">Bad</button>
                        <button onclick="setRating('sync', 'Good')" class="rating-btn">Good</button>
                        <button onclick="setRating('sync', 'Excellent')" class="rating-btn">Ex</button>
                    </div>
                </div>
                <div>
                    <label class="label-text">2-B. 脱力・ダイナミクス</label>
                    <div class="rating-group" id="rating-relax">
                        <button onclick="setRating('relax', 'Bad')" class="rating-btn">Bad</button>
                        <button onclick="setRating('relax', 'Good')" class="rating-btn">Good</button>
                        <button onclick="setRating('relax', 'Excellent')" class="rating-btn">Ex</button>
                    </div>
                </div>
            </section>

            <section class="space-y-4">
                <label class="label-text text-blue-300">3. チェス的分析</label>
                <div>
                    <span class="text-[10px] text-green-400 font-bold uppercase">★ 今日の好手 (Best Move)</span>
                    <textarea id="best-move" class="w-full mt-1 p-3 input-field rounded-xl text-sm h-20" placeholder="例: BPM60で集中が途切れなかった"></textarea>
                </div>
                <div>
                    <span class="text-[10px] text-red-400 font-bold uppercase">▲ 疑問手 (Inaccuracy)</span>
                    <textarea id="bad-move" class="w-full mt-1 p-3 input-field rounded-xl text-sm h-20" placeholder="例: 左手のダブルが不明瞭になった"></textarea>
                </div>
            </section>

            <section>
                <label class="label-text">4. 自分への褒めポイント</label>
                <textarea id="praise" class="w-full p-3 input-field rounded-xl text-sm h-20" placeholder="継続した自分を称える"></textarea>
            </section>

            <button onclick="copyReview()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all">
                📋 記録をコピーする
            </button>
        </div>

        <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-white text-black px-6 py-3 rounded-full text-sm font-bold opacity-0 transition-opacity pointer-events-none shadow-2xl">
            コピー完了！
        </div>
    </div>

    <script>
        let ratings = { sync: 'Good', relax: 'Good' };
        const bpmGuides = [
            { main: "100", sub: "60-80" }, { main: "60-80", sub: "70-80" }, 
            { main: "140", sub: "140" }, { main: "70-80", sub: "70-80" }, 
            { main: "120", sub: "70-80" }, { main: "70-80", sub: "70-80" }, { main: "-", sub: "-" }
        ];

        window.onload = function() {
            const today = new Date();
            const dateInput = document.getElementById('practice-date');
            dateInput.value = today.toISOString().split('T')[0];
            updateMenuByDate();
            // 初期状態をGoodに設定
            setRating('sync', 'Good');
            setRating('relax', 'Good');
        };

        function setRating(type, value) {
            ratings[type] = value;
            const container = document.getElementById('rating-' + type);
            const btns = container.querySelectorAll('.rating-btn');
            btns.forEach(btn => {
                btn.className = 'rating-btn';
                if (btn.innerText === (value === 'Excellent' ? 'Ex' : value)) {
                    btn.classList.add(value === 'Bad' ? 'active-bad' : (value === 'Good' ? 'active-good' : 'active-ex'));
                }
            });
        }

        function updateMenuByDate() {
            const selectedDate = new Date(document.getElementById('practice-date').value);
            const dayIndex = selectedDate.getDay(); 
            document.getElementById('todo-select').selectedIndex = (dayIndex === 0) ? 6 : dayIndex - 1;
            updateBpmPlaceholder();
        }

        function updateBpmPlaceholder() {
            const idx = document.getElementById('todo-select').selectedIndex;
            document.getElementById('bpm-main').placeholder = `目安: ${bpmGuides[idx].main}`;
            document.getElementById('bpm-sub').placeholder = `目安: ${bpmGuides[idx].sub}`;
        }

        function copyReview() {
            const dateVal = document.getElementById('practice-date').value;
            const dateFormatted = new Date(dateVal).toLocaleDateString('ja-JP', { weekday: 'short', month: '2-digit', day: '2-digit' });
            const todo = document.getElementById('todo-select').value;
            const bpmMain = document.getElementById('bpm-main').value || "未入力";
            const bpmSub = document.getElementById('bpm-sub').value || "未入力";
            
            const text = `【Drum Practice】${dateFormatted}\n` +
                         `━━━━━━━━━━━━━━━\n` +
                         `■ Menu: ${todo}\n` +
                         `■ BPM : Main[${bpmMain}] Sub[${bpmSub}]\n` +
                         `■ Eval: シンクロ[${ratings.sync}] 脱力[${ratings.relax}]\n\n` +
                         `■ 今日の好手 (Best Move):\n   ${document.getElementById('best-move').value || "特になし"}\n\n` +
                         `■ 疑問手 (Inaccuracy):\n   ${document.getElementById('bad-move').value || "特になし"}\n\n` +
                         `■ 自分への褒めポイント:\n   ${document.getElementById('praise').value || "なし"}\n` +
                         `━━━━━━━━━━━━━━━`;

            const ta = document.createElement("textarea"); ta.value = text;
            document.body.appendChild(ta); ta.select(); document.execCommand('copy');
            document.body.removeChild(ta);

            const toast = document.getElementById('toast');
            toast.style.opacity = '1'; setTimeout(() => toast.style.opacity = '0', 2000);
        }
    </script>
</body>
</html>
